name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black flake8 mypy
      - run: pip install black flake8 mypy

- name: Black (check)
  shell: bash
  run: |
    targets=()
    [[ -d packages ]] && targets+=(packages)
    [[ -d api ]] && targets+=(api)

    # If neither exists, do nothing (avoid failing the job)
    [[ ${#targets[@]} -eq 0 ]] && { echo "No lint targets found"; exit 0; }

    black --check "${targets[@]}"

- name: Flake8
  shell: bash
  run: |
    targets=()
    [[ -d packages ]] && targets+=(packages)
    [[ -d api ]] && targets+=(api)

    [[ ${#targets[@]} -eq 0 ]] && { echo "No lint targets found"; exit 0; }

    flake8 "${targets[@]}"

  terraform-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: cd infra && terraform init && terraform validate
